server:
  port: 8080
  servlet:
    context-path: /api

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: backend

  datasource:
    url: ${SUPABASE_DB_URL:${DB_URL:jdbc:postgresql://localhost:5432/aimong}}
    username: ${SUPABASE_DB_USERNAME:${DB_USERNAME:aimong}}
    password: ${SUPABASE_DB_PASSWORD:${DB_PASSWORD:aimong}}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3s

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}

jwt:
  secret: ${JWT_SECRET}
  issuer: aimong-backend
  child-session-expiration: 2592000000

aimong:
  mission:
    question:
      set-size: 10
      attempt-ttl-minutes: 30
      dynamic-generation-enabled: false
    generation:
      target-pool-per-mission: 60
      target-packs-per-mission: 6
      questions-per-pack: 10
      soft-refill-trigger: 36
      hard-refill-trigger: 18
      async-generate-batch: 10
      async-refill-fixed-delay-ms: 30000
      sync-generate-batch: 10
      mini-max-retry: 2
    model-routing:
      default-model: gpt-5-mini
      escalated-model: gpt-5.4-mini
    seed:
      auto-run: false
      persist: false
