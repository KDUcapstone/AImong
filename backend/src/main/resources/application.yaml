server:
  servlet:
    context-path: /api

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aimong}
    username: ${DB_USERNAME:aimong}
    password: ${DB_PASSWORD:aimong}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6400}
      timeout: 3s

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}

jwt:
  secret: ${JWT_SECRET}
  issuer: aimong-backend
  child-session-expiration: 2592000000
