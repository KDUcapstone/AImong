server:
  servlet:
    context-path: /api

spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres
    username: postgres.uuipyygaenzyceebrena
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3s

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}

jwt:
  secret: ${JWT_SECRET}
  issuer: aimong-backend
  child-session-expiration: 2592000000
