server:
  port: 8080

spring:
  datasource:
    url: ${SUPABASE_DB_URL:${DB_URL}}
    username: ${SUPABASE_DB_USERNAME:${DB_USERNAME}}
    password: ${SUPABASE_DB_PASSWORD:${DB_PASSWORD}}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
