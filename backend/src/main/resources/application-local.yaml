spring:
  datasource:
    url: ${LOCAL_DB_URL:${DB_URL:jdbc:postgresql://localhost:54329/aimong_local}}
    username: ${LOCAL_DB_USERNAME:${DB_USERNAME:aimong}}
    password: ${LOCAL_DB_PASSWORD:${DB_PASSWORD:aimong}}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${LOCAL_REDIS_HOST:${REDIS_HOST:localhost}}
      port: ${LOCAL_REDIS_PORT:${REDIS_PORT:6380}}
  flyway:
    validate-on-migrate: false
